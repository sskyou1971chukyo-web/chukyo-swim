<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中京大学 水泳部</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Noto+Sans+JP:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"
  onerror="window.liff={isInClient:()=>false,init:()=>Promise.resolve(),isLoggedIn:()=>false,login:()=>{}}">
</script>
<script>
// LIFF SDKが読み込めない環境（ブラウザ直接アクセス等）のフォールバック
if (typeof liff === 'undefined') {
  window.liff = { isInClient:()=>false, init:()=>Promise.resolve(), isLoggedIn:()=>false, login:()=>{} };
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
/* ══════════════════ 変数・リセット ══════════════════ */
:root {
  --bg:      #f0f2f7;
  --surface: #e8ecf3;
  --card:    #ffffff;
  --border:  rgba(0,0,0,.06);
  --primary: #0055d4;
  --primary2:#003da0;
  --cyan:    #0055d4;
  --cyan2:   #003da0;
  --gold:    #d4930a;
  --green:   #16a34a;
  --red:     #dc2626;
  --text:    #111827;
  --dim:     #6b7280;
  --muted:   #9ca3af;
  --r:       16px;
  --safe-b:  env(safe-area-inset-bottom, 12px);
  --font-display: 'Outfit', 'Noto Sans JP', sans-serif;
  --font-body: 'DM Sans', 'Noto Sans JP', sans-serif;
  --font-mono: 'Outfit', monospace;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.04);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:var(--font-body);
  font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;letter-spacing:-.01em;}
button{border:none;outline:none;cursor:pointer;font-family:var(--font-body);}
input,select,textarea{font-family:var(--font-body);outline:none;}
a{color:var(--primary);text-decoration:none;}

/* ══════════════════ スクロール可能エリア ══════════════════ */
.scroll-body{
  position:fixed;top:56px;bottom:calc(60px + var(--safe-b));
  left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
.scroll-body.no-bottom{bottom:0;}

/* ══════════════════ スプラッシュ ══════════════════ */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .5s ease;
}
#splash.hidden{opacity:0;pointer-events:none;}
.splash-logo{
  width:88px;height:88px;border-radius:26px;
  background:linear-gradient(135deg,var(--cyan),#0050ee);
  display:flex;align-items:center;justify-content:center;font-size:44px;
  box-shadow:0 0 48px rgba(26,115,232,.45);
  animation:logoPulse 1.2s ease infinite alternate;
}
@keyframes logoPulse{to{box-shadow:0 0 72px rgba(26,115,232,.7);}}
.splash-ttl{font-family:var(--font-display);font-size:28px;
  font-weight:700;letter-spacing:3px;color:var(--cyan);}
.splash-sub{font-size:12px;color:var(--dim);letter-spacing:1px;}
.splash-dots{display:flex;gap:6px;margin-top:8px;}
.splash-dots span{width:8px;height:8px;border-radius:50%;background:var(--dim);
  animation:dotBlink 1.2s ease infinite;}
.splash-dots span:nth-child(2){animation-delay:.2s;}
.splash-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dotBlink{0%,80%{opacity:.2}40%{opacity:1}}

/* ══════════════════ ヘッダー ══════════════════ */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:500;height:56px;
  background:rgba(5,13,26,.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:10px;
}
.hdr-back{
  width:38px;height:38px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);
  display:none;align-items:center;justify-content:center;
  font-size:22px;color:var(--dim);cursor:pointer;flex-shrink:0;
}
.hdr-back.show{display:flex;}
.hdr-back:active{background:var(--border);}
.hdr-title{font-family:var(--font-display);font-size:20px;
  font-weight:700;letter-spacing:1px;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-title span{color:var(--cyan);}
.hdr-badge{
  font-size:10px;padding:3px 8px;border-radius:20px;flex-shrink:0;
  font-family:var(--font-display);font-weight:700;letter-spacing:.5px;
}
.badge-staff{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid rgba(245,200,66,.3);}
.badge-player{background:rgba(26,115,232,.1);color:var(--cyan);border:1px solid rgba(26,115,232,.25);}

/* ══════════════════ ボトムナビ ══════════════════ */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border);
  display:flex;padding-bottom:var(--safe-b);
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 4px 4px;font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;
  transition:color .2s;letter-spacing:.02em;
}
.bnav-item.active{color:var(--primary);font-weight:700;}
.bnav-item svg{width:22px;height:22px;margin-bottom:3px;}

/* ══════════════════ 共通パーツ ══════════════════ */
.section-lbl{
  font-family:var(--font-display);font-size:11px;font-weight:700;
  letter-spacing:.12em;color:var(--muted);text-transform:uppercase;
  padding:0;margin:20px 0 10px;
}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s;}
.card:active{box-shadow:var(--shadow-md);transform:scale(.995);}
.tag{font-family:var(--font-display);font-size:10px;padding:3px 10px;border-radius:100px;
  font-weight:600;letter-spacing:.04em;}
.tag-ev{background:rgba(0,85,212,.06);color:var(--primary);border:1px solid rgba(0,85,212,.12);}
.tag-yr{background:rgba(212,147,10,.06);color:var(--gold);border:1px solid rgba(212,147,10,.12);}
.tag-pb{background:rgba(22,163,74,.06);color:var(--green);border:1px solid rgba(22,163,74,.12);}

.btn-primary{
  width:100%;padding:14px;border-radius:var(--r);
  background:var(--cyan);color:#000;font-size:15px;font-weight:700;
  letter-spacing:.5px;transition:opacity .2s;
}
.btn-primary:active{opacity:.8;}
.btn-outline{
  padding:10px 18px;border-radius:10px;
  background:rgba(26,115,232,.1);border:1px solid rgba(26,115,232,.3);
  color:var(--cyan);font-size:13px;font-weight:500;
  display:inline-flex;align-items:center;gap:6px;transition:background .2s;
}
.btn-outline:active{background:rgba(26,115,232,.2);}

/* ══════════════════ ローディング ══════════════════ */
.loading-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:60vh;gap:12px;
}
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--border);border-top-color:var(--cyan);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════ ページ管理 ══════════════════ */
.page{display:none;}
.page.active{display:block;}

/* ══════════════════ 登録画面 ══════════════════ */
#page-register .reg-hero{
  text-align:center;padding:32px 24px 20px;
  background:linear-gradient(180deg,#0d2d4f,var(--bg));
}
#page-register .reg-icon{font-size:56px;margin-bottom:12px;}
#page-register .reg-ttl{
  font-family:var(--font-display);font-size:26px;font-weight:700;
}
#page-register .reg-sub{font-size:12px;color:var(--dim);margin-top:6px;}
.search-field{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:11px 14px 11px 40px;
  color:var(--text);font-size:14px;width:100%;transition:border-color .2s;
}
.search-field:focus{border-color:var(--cyan2);}
.search-field::placeholder{color:var(--dim);}
.search-wrap{position:relative;}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;
  transform:translateY(-50%);font-size:15px;}
.candidate-card{
  padding:14px 16px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:border-color .2s;
}
.candidate-card:active{border-color:var(--cyan2);transform:scale(.99);}

/* ══════════════════ ホーム（スタッフ） ══════════════════ */
.hero-banner{
  margin:0;background:linear-gradient(145deg,#0055d4 0%,#003da0 50%,#001d5c 100%);
  border-bottom:none;padding:24px 20px;position:relative;overflow:hidden;
  color:#fff;
}
.hero-banner::before{content:'';position:absolute;top:-40%;right:-20%;width:60%;height:160%;
  background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%);pointer-events:none;}
.hero-banner::after{content:'🏊';position:absolute;right:20px;top:50%;
  transform:translateY(-50%);font-size:56px;opacity:.1;filter:grayscale(1);}
.hero-lbl{font-family:var(--font-display);font-size:11px;
  font-weight:600;letter-spacing:.15em;color:rgba(255,255,255,.6);margin-bottom:6px;text-transform:uppercase;}
.hero-ttl{font-family:var(--font-display);font-size:28px;
  font-weight:800;line-height:1.1;color:#fff;letter-spacing:-.02em;}
.hero-stats{display:flex;gap:28px;margin-top:16px;}
.hero-stat .v{font-family:var(--font-display);font-size:32px;
  font-weight:800;color:#fff;letter-spacing:-.03em;}
.hero-stat .l{font-family:var(--font-display);font-size:10px;font-weight:500;
  color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}

.ath-card{
  padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:all .2s;
}
.ath-card:active{transform:scale(.98);}
.ath-avatar{
  width:44px;height:44px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:16px;font-weight:700;
  background:linear-gradient(145deg,#0055d4,#003da0);color:#fff;
  box-shadow:0 2px 8px rgba(0,85,212,.2);
}
.ath-avatar.yr4{background:linear-gradient(145deg,#b8860b,#d4930a);box-shadow:0 2px 8px rgba(212,147,10,.2);}
.ath-avatar.yr3{background:linear-gradient(145deg,#0f7a3e,#16a34a);box-shadow:0 2px 8px rgba(22,163,74,.2);}
.ath-avatar.yr2{background:linear-gradient(145deg,#0055d4,#2563eb);box-shadow:0 2px 8px rgba(37,99,235,.2);}
.ath-avatar.yr1{background:linear-gradient(145deg,#7c3aed,#a855f7);box-shadow:0 2px 8px rgba(168,85,247,.2);}
.ath-avatar.yr-obog{background:linear-gradient(145deg,#4b5563,#6b7280);box-shadow:0 2px 8px rgba(75,85,99,.15);}
.ath-name{font-family:var(--font-display);font-size:16px;font-weight:700;line-height:1.3;letter-spacing:-.01em;color:var(--text);}
.ath-kana{font-size:10px;color:var(--muted);font-weight:400;letter-spacing:.04em;}
.ath-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}

/* ══════════════════ ホーム（選手） ══════════════════ */
.my-hero{
  background:linear-gradient(180deg,#0055d4 0%,#003da0 40%,var(--bg) 100%);
  padding:28px 20px 0;text-align:center;
}
.my-avatar{
  width:76px;height:76px;border-radius:22px;margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:28px;font-weight:700;
  background:rgba(255,255,255,.15);color:#fff;
  border:2px solid rgba(255,255,255,.25);backdrop-filter:blur(10px);
  box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.my-name{font-size:26px;font-weight:900;color:#fff;}
.my-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px;padding-bottom:16px;}

/* ══════════════════ 選手詳細タブ ══════════════════ */
.tabs-bar{
  display:flex;background:var(--card);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;overflow-x:auto;scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-item{
  flex:1;min-width:72px;padding:12px 6px 10px;text-align:center;
  font-family:var(--font-display);font-size:11px;font-weight:600;
  letter-spacing:.06em;color:var(--muted);cursor:pointer;
  border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .2s;
}
.tab-item .ti{font-size:18px;display:block;margin-bottom:3px;}
.tab-item.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700;}
.tab-pane{display:none;padding:14px;padding-bottom:16px;}
.tab-pane.active{display:block;}
#tab-best{background:#f8f9fa;border-radius:0 0 14px 14px;}

/* ══════════════════ 動画タブ ══════════════════ */
.video-card{overflow:hidden;cursor:pointer;transition:border-color .2s;}
.video-card:active{border-color:var(--cyan2);}
.video-thumb{
  aspect-ratio:16/9;background:linear-gradient(135deg,#0a1f3a,#030d1e);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
}
.video-play{
  width:54px;height:54px;border-radius:50%;
  background:rgba(26,115,232,.9);display:flex;align-items:center;justify-content:center;
  font-size:22px;color:#000;font-weight:700;position:absolute;
}
.video-dur{
  position:absolute;bottom:8px;right:8px;
  background:rgba(0,0,0,.75);color:var(--dim);
  font-size:10px;padding:2px 7px;border-radius:6px;
}
.video-info{padding:11px 13px;}
.video-ttl{font-size:13px;font-weight:500;margin-bottom:3px;}
.video-meta{font-size:11px;color:var(--dim);}

/* ══════════════════ レースタブ ══════════════════ */
.race-card{padding:13px 14px;cursor:pointer;transition:border-color .2s;}
.race-card:active{border-color:var(--cyan2);}
.race-row1{display:flex;justify-content:space-between;align-items:flex-start;}
.race-ttl{font-size:13px;font-weight:500;}
.race-date{font-size:10px;color:var(--dim);margin-top:2px;}
.race-time{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--cyan);}
.race-time.pb{color:var(--gold);}
.race-row2{display:flex;gap:7px;align-items:center;margin-top:7px;flex-wrap:wrap;}
.race-ev{font-size:11px;color:var(--dim);}
.place-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-family:var(--font-display);font-weight:600;}
.p1{background:rgba(245,200,66,.15);color:var(--gold);}
.p2{background:rgba(180,180,180,.15);color:#bbb;}
.p3{background:rgba(205,127,50,.15);color:#d4915a;}
.pN{background:rgba(100,130,160,.1);color:var(--dim);}

/* ══════════════════ ラップ詳細 ══════════════════ */
.lap-modal-overlay{
  position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.85);
  display:none;align-items:flex-end;justify-content:center;
}
.lap-modal-overlay.open{display:flex;}
.lap-sheet{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px 20px 0 0;width:100%;max-width:480px;
  padding:20px;max-height:70vh;overflow-y:auto;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}}
.lap-handle{width:36px;height:4px;border-radius:2px;background:var(--border);
  margin:0 auto 16px;}
.lap-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.lap-row:last-child{border-bottom:none;}
.lap-label{font-size:12px;color:var(--dim);}
.lap-value{font-family:var(--font-display);font-size:20px;
  font-weight:700;color:var(--cyan);}
.lap-split{font-size:11px;color:var(--green);margin-left:8px;}

/* ══════════════════ ベストタイムタブ ══════════════════ */
.best-card{padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);}
.best-ev{font-family:var(--font-display);font-size:12px;
  font-weight:600;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;text-transform:uppercase;}
.best-val{font-family:var(--font-display);font-size:34px;
  font-weight:800;color:var(--primary);line-height:1;letter-spacing:-.03em;}
.best-meta{font-size:11px;color:var(--muted);margin-top:4px;font-weight:400;}
.best-vid-btn{
  margin-top:11px;display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:100px;font-size:12px;font-weight:600;
  background:rgba(0,85,212,.06);border:1px solid rgba(0,85,212,.15);
  color:var(--primary);cursor:pointer;transition:all .2s;
}
.best-vid-btn:active{background:rgba(0,85,212,.12);}

/* ══════════════════ グラフタブ ══════════════════ */
.ev-chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
.ev-chips::-webkit-scrollbar{display:none;}
.ev-chip{
  flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:11px;
  font-family:var(--font-display);font-weight:600;cursor:pointer;
  background:var(--card);border:1px solid var(--border);color:var(--dim);transition:all .2s;
}
.ev-chip.active{background:var(--cyan);color:#000;border-color:var(--cyan);}
.graph-wrap{position:relative;height:210px;}
.improv-box{
  margin-top:11px;background:rgba(57,217,138,.08);
  border:1px solid rgba(57,217,138,.25);border-radius:10px;
  padding:10px 14px;display:flex;justify-content:space-between;align-items:center;
}
.improv-lbl{font-size:11px;color:var(--dim);}
.improv-val{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--green);}

/* ══════════════════ 比較画面 ══════════════════ */
.compare-setup{padding:16px;}
.comp-sel-lbl{font-size:12px;color:var(--dim);margin-bottom:8px;}
.comp-search-wrap{position:relative;margin-bottom:12px;}
.comp-search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;
  transform:translateY(-50%);font-size:14px;}
.comp-header{
  display:grid;grid-template-columns:1fr auto 1fr;
  gap:8px;align-items:center;padding:16px;margin-bottom:4px;
}
.comp-player{text-align:center;}
.comp-avatar{
  width:52px;height:52px;border-radius:50%;margin:0 auto 6px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:20px;font-weight:700;
  background:linear-gradient(135deg,var(--cyan2),#0040aa);color:#fff;
}
.comp-vs{font-family:var(--font-display);font-size:20px;
  font-weight:900;color:var(--dim);text-align:center;}
.comp-name{font-size:12px;font-weight:500;text-align:center;}
.comp-best{font-family:var(--font-display);font-size:18px;
  font-weight:700;text-align:center;margin-top:2px;}

.comp-table{width:100%;border-collapse:collapse;font-size:12px;}
.comp-table th{
  background:var(--card);padding:8px 10px;text-align:center;
  font-family:var(--font-display);font-size:11px;font-weight:700;
  color:var(--dim);letter-spacing:.5px;border:1px solid var(--border);
}
.comp-table td{
  padding:9px 10px;text-align:center;border:1px solid var(--border);
  font-family:var(--font-display);font-size:14px;font-weight:600;
}
.comp-table tr:nth-child(even) td{background:rgba(255,255,255,.02);}
.td-mine{color:var(--cyan);}
.td-theirs{color:#e8f0fe;}
.td-diff.pos{color:var(--red);}
.td-diff.neg{color:var(--green);}
.td-diff.zero{color:var(--dim);}

.comp-graph-wrap{position:relative;height:200px;}

/* ══════════════════ 記録追加（スタッフ） ══════════════════ */
.form-group{margin-bottom:14px;}
.form-lbl{font-family:var(--font-display);font-size:11px;color:var(--muted);letter-spacing:.06em;
  font-weight:600;margin-bottom:6px;display:block;text-transform:uppercase;}
.form-input{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 13px;color:var(--text);font-size:14px;
  transition:border-color .2s;
}
.form-input:focus{border-color:var(--cyan2);}
.form-input option{background:var(--surface);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.form-check{display:flex;align-items:center;gap:8px;font-size:13px;}
.form-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--cyan);}
.lap-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.success-msg{
  background:rgba(57,217,138,.1);border:1px solid rgba(57,217,138,.3);
  border-radius:10px;padding:12px 16px;font-size:13px;color:var(--green);
  display:none;margin-top:12px;
}
.error-msg{
  background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);
  border-radius:10px;padding:12px 16px;font-size:13px;color:var(--red);
  display:none;margin-top:12px;
}

/* ══════════════════ 動画モーダル ══════════════════ */
.modal-ov{
  position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.88);
  display:none;align-items:center;justify-content:center;padding:16px;
}
.modal-ov.open{display:flex;}
.modal-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;width:100%;max-width:480px;overflow:hidden;
  animation:slideUp .3s ease;
}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:13px 15px;border-bottom:1px solid var(--border);}
.modal-hdr-ttl{font-family:var(--font-display);font-size:17px;font-weight:700;}
.modal-close{
  width:30px;height:30px;border-radius:8px;background:var(--card);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--dim);}
.modal-video-area{aspect-ratio:16/9;background:#000;display:flex;
  align-items:center;justify-content:center;flex-direction:column;gap:8px;font-size:36px;}
.modal-video-note{font-size:11px;color:var(--dim);}
.modal-open-btn{
  display:block;margin:12px 14px 14px;padding:12px;border-radius:12px;
  background:var(--cyan);text-align:center;font-family:var(--font-display);
  font-size:16px;font-weight:700;color:#000;cursor:pointer;
}

/* ══════════════════ 空状態 ══════════════════ */
.empty-state{
  text-align:center;padding:48px 24px;
  font-size:13px;color:var(--dim);
}
.empty-state .es-icon{font-size:40px;margin-bottom:12px;}

/* ══════════════════ アニメーション ══════════════════ */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .35s ease both;}
</style>
</head>

// モックAPI（DEV_MODE=true の時にfetchの代わりに呼ばれる）
function mockApi(payload) {
  const { action, athleteId, myId, targetId, event: ev } = payload;

  if (action === "getMyData") {
    const role = DEV_ROLE;
    const me = role === "スタッフ"
      ? MOCK_DB.roster.find(r => r.lineId === DEV_LINE_ID)
      : { athleteId:"C086", name:"駿河　藍", grade:"1年", gender:"女", event:"400m IM", role:"選手" };
    if (!me) return { success:false, error:"未登録" };
    return {
      success:   true,
      profile:   { ...me, isStaff: me.role === "スタッフ" },
      times:     MOCK_DB.times[me.athleteId]    || [],
      bestTimes: MOCK_DB.bestTimes[me.athleteId]|| [],
      videos:    MOCK_DB.videos[me.athleteId]   || [],
    };
  }

  if (action === "getAthleteList") {
    return {
      success:  true,
      athletes: MOCK_DB.roster.filter(r => r.role === "選手"),
    };
  }

  if (action === "getAthleteData") {
    const p = MOCK_DB.roster.find(r => r.athleteId === athleteId);
    if (!p) return { success:false, error:"選手が見つかりません" };
    return {
      success:   true,
      profile:   p,
      times:     MOCK_DB.times[athleteId]    || [],
      bestTimes: MOCK_DB.bestTimes[athleteId]|| [],
      videos:    MOCK_DB.videos[athleteId]   || [],
      graphData: MOCK_DB.graphData[athleteId]|| {},
    };
  }

  if (action === "compareAthletes") {
    const myP  = MOCK_DB.roster.find(r => r.athleteId === myId);
    const tgP  = MOCK_DB.roster.find(r => r.athleteId === targetId);
    const myRec = (MOCK_DB.times[myId]||[]).filter(r => !ev || r.event===ev);
    const tgRec = (MOCK_DB.times[targetId]||[]).filter(r => !ev || r.event===ev);
    const best  = recs => recs.length ? recs.reduce((b,r) => timeToSec(r.totalTime)<timeToSec(b.totalTime)?r:b, recs[0]) : null;
    const myBest = best(myRec), tgBest = best(tgRec);
    const allEvs = [...new Set((MOCK_DB.times[myId]||[]).map(r=>r.event))];
    const secDiff = myBest && tgBest ? Math.round((timeToSec(myBest.totalTime)-timeToSec(tgBest.totalTime))*100)/100 : null;
    return {
      success: true, event: ev,
      me:     { profile:myP, best:myBest, history:[...myRec].reverse(), allEvents:allEvs },
      target: { profile:tgP, best:tgBest, history:[...tgRec].reverse() },
      diff: secDiff !== null ? { seconds:secDiff, display: secDiff>0?`+${secDiff}秒（比較相手より遅い）`:`${secDiff}秒（比較相手より速い）` } : null,
    };
  }

  if (action === "addTimeRecord") {
    return { success:true, message:"【デモ】記録を登録しました（実際には書き込まれません）", recordId:"R999" };
  }

  return { success:false, error:"未知のaction: " + action };
}

//  ベストタイムキャッシュ（一括取得→高速表示）

async function loadAllBestsCache() {
  try {
    const res = await api({ action: "getAllDataCached" });
    if (res.success && res.allBests) {
      state.allBestsCache = res.allBests;
      state.cacheLoaded = true;
      console.log("ベストタイムキャッシュ取得完了", res.fromCache ? "(キャッシュ)" : "(新規取得)");
    }
  } catch(e) {
    console.error("キャッシュ取得エラー:", e);
  }
}

// ══════════════════════════════════════════════════════
//  Custベスト一覧 同期ボタン（更新ボタン）
// ══════════════════════════════════════════════════════
async function syncFromCust() {
  const btn    = document.getElementById("syncBtn");
  const status = document.getElementById("syncStatus");
  if (!btn) return;

  const originalText = btn.innerHTML;
  btn.innerHTML = "⏳ 読み込み中...（最大1分）";
  btn.disabled  = true;
  status.textContent = "Custベスト一覧を読み込んでいます...";
  status.style.color = "var(--cyan)";

  try {
    const res = await api({ action: "syncFromCust" });
    if (res.success) {
      status.textContent = "✅ " + (res.message || "同期完了しました");
      status.style.color = "var(--green)";
      // 一覧を再読込
      setTimeout(() => { loadStaffHome(); }, 1500);
    } else {
      status.textContent = "❌ " + (res.error || "同期に失敗しました");
      status.style.color = "var(--red)";
    }
  } catch(e) {
    status.textContent = "❌ エラー: " + e.message;
    status.style.color = "var(--red)";
  }

  btn.innerHTML = originalText;
  btn.disabled  = false;
}


// ══════════════════════════════════════════════════════
//  起動処理
// ══════════════════════════════════════════════════════
async function init() {
  try {
    if (DEV_MODE) {
      // ── DEVモード：モックデータで動作（GAS不要）──
      state.lineId      = DEV_LINE_ID;
      state.displayName = DEV_DISP_NAME;

    } else if (liff.isInClient()) {
      // ── 本番：LINE内ブラウザで起動 ──
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile     = await liff.getProfile();
      state.lineId      = profile.userId;
      state.displayName = profile.displayName;

    } else {
      // ── ブラウザで直接開いた場合：GASに繋ぐがLIFF不要 ──
      // スプレッドシートのG列に BROWSER_TEST_LINE_ID を入れておくと動作確認できる
      state.lineId      = typeof BROWSER_TEST_LINE_ID !== "undefined"
                          ? BROWSER_TEST_LINE_ID : "TEST_STAFF_001";
      state.displayName = "ブラウザテスト";
    }

    // GASに認証リクエスト
    const authRes = await api({ action: "getMyData", lineId: state.lineId });

    if (authRes.success) {
      // 登録済み → ホーム画面へ
      state.currentUser = authRes.profile;
      setupAfterLogin(authRes);
    } else if (authRes.error === "未登録") {
      // 未登録 → 登録画面へ
      showRegisterPage();
    } else {
      showError("接続エラー: " + (authRes.error || "不明なエラー"));
    }

  } catch (err) {
    showError("起動エラー: " + err.message);
  } finally {
    hideSplash();
  }
}

function setupAfterLogin(myData) {
  const u = myData.profile;

  // バッジ表示
  const badge = document.getElementById("hdrBadge");
  badge.textContent  = u.role;
  badge.className    = "hdr-badge " + (u.isStaff || u.role === "スタッフ" ? "badge-staff" : "badge-player");
  badge.style.display = "";

  if (u.role === "スタッフ") {
    // スタッフ用ナビ追加
    document.getElementById("nav-record").style.display = "";
    loadStaffHome();
  } else {
    // 選手用ホーム
    renderPlayerHome(myData);
    showPage("page-player-home");
    // バックグラウンドで全ベストタイムキャッシュを取得
    if (!state.cacheLoaded) loadAllBestsCache();
  }
}

// ══════════════════════════════════════════════════════
//  API 呼び出し（GASとの通信 / DEV_MODEはモックを使用）
// ══════════════════════════════════════════════════════
async function api(payload) {
  payload.lineId = payload.lineId || state.lineId;

  // ★ DEV_MODE=true のときはfetchせずモックデータを返す
  if (DEV_MODE) {
    await new Promise(r => setTimeout(r, 120)); // 読み込み感を出す
    return mockApi(payload);
  }

  // 本番：GASにPOSTリクエスト
  try {
    const res = await fetch(GAS_URL, {
      method:   "POST",
      // ★ text/plain にすることでCORSプリフライトを回避（GASの仕様）
      headers:  { "Content-Type": "text/plain;charset=utf-8" },
      body:     JSON.stringify(payload),
      redirect: "follow",
    });
    return await res.json();
  } catch (err) {
    console.error("API Error:", err);
    return { success: false, error: err.message };
  }
}

function filterByGrade(grade) {
  state.currentGradeFilter = grade;
  // チップのスタイル更新
  document.querySelectorAll(".grade-chip").forEach(el => {
    const isActive = el.dataset.grade === grade;
    el.style.background = isActive ? "var(--cyan)" : "var(--card)";
    el.style.color       = isActive ? "#fff"        : "var(--dim)";
  });
  const q = document.getElementById("staffSearch")?.value || "";
  applyFilters(q, grade);
}

function filterAthletes(q) {
  applyFilters(q, state.currentGradeFilter || "全員");
}

function applyFilters(q, grade) {
  let list = state.athleteList;
  if (grade && grade !== "全員") list = list.filter(a => a.grade === grade);
  if (q) list = list.filter(a =>
    a.name.replace(/\s/g,"").includes(q.replace(/\s/g,"")) ||
    (a.event && a.event.includes(q)) ||
    (a.pref  && a.pref.includes(q))
  );
  renderAthleteList(list);
}

/** 大会名や日付から年月文字列を抽出（ソート用） */
function extractYearMonth(str) {
  if (!str) return "0000_00";
  // "関西中部2026_4_長" → "2026_04"
  const m1 = str.match(/(\d{4})_(\d{1,2})/);
  if (m1) return m1[1] + "_" + m1[2].padStart(2, "0");
  // "2024-09-05" → "2024_09"
  const m2 = str.match(/(\d{4})-(\d{2})/);
  if (m2) return m2[1] + "_" + m2[2];
  // "2024日本学生" → "2024_00"
  const m3 = str.match(/(\d{4})/);
  if (m3) return m3[1] + "_00";
  return "0000_00";
}

function renderBestTab() {
  const allBests = state.currentAthlete.bestTimes || [];
  const el = document.getElementById("tab-best");
  if (allBests.length === 0) { el.innerHTML = emptyHTML("記録がまだありません"); return; }

  if (!state.bestViewMode) state.bestViewMode = "stroke";
  const mode = state.bestViewMode;

  // 長水路・短水路を分離
  const longBests = allBests.filter(b => !b.event.includes("(短水路)"));
  const shortBests = allBests.filter(b => b.event.includes("(短水路)"));
  // 短水路の種目名から(短水路)を除去して比較しやすくする
  const shortMap = {};
  shortBests.forEach(b => {
    const ev = b.event.replace("(短水路)", "").trim();
    shortMap[ev] = b;
  });

  const strokeMap = { Fr:"自由形", Ba:"背泳ぎ", Br:"平泳ぎ", Fly:"バタフライ", IM:"個メ" };
  const strokeColors = { Fr:"var(--primary)", Ba:"#ea580c", Br:"#16a34a", Fly:"#7c3aed", IM:"#dc2626" };
  const strokeOrder = ["Fr","Ba","Br","Fly","IM"];
  const distOrder = ["50m","100m","200m","400m","800m","1500m"];
  const getStroke = (ev) => { const m = ev.match(/(Fr|Ba|Br|Fly|IM)/); return m ? m[1] : ""; };
  const getDist = (ev) => { const m = ev.match(/(\d+m)/); return m ? m[1] : ""; };

  // 全種目リスト（長水路と短水路の和集合）
  const allEvents = new Set();
  longBests.forEach(b => allEvents.add(b.event));
  shortBests.forEach(b => allEvents.add(b.event.replace("(短水路)","").trim()));

  const modeBtn = (m, label) => `<div onclick="state.bestViewMode='${m}';renderBestTab()"
    style="padding:6px 14px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;
    background:${mode===m?'var(--primary)':'#e8eaed'};color:${mode===m?'#fff':'#5f6368'};">${label}</div>`;

  let html = `<div style="background:#fff;border-radius:14px;padding:14px;">
    <div style="display:flex;gap:6px;margin-bottom:14px;">
      ${modeBtn("stroke","種目別")}${modeBtn("all","一覧")}${modeBtn("dist","距離別")}
    </div>`;

  // ── ヘッダー行 ──
  html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:4px 0 8px;border-bottom:2px solid #e0e0e0;margin-bottom:8px;">
    <div style="font-size:11px;font-weight:700;color:#999;">種目</div>
    <div style="font-size:11px;font-weight:700;color:var(--primary);text-align:center;">長水路</div>
    <div style="font-size:11px;font-weight:700;color:#e8710a;text-align:center;">短水路</div>
  </div>`;

  if (mode === "stroke") {
    strokeOrder.forEach(sk => {
      const items = [...allEvents].filter(ev => getStroke(ev) === sk);
      if (items.length === 0) return;
      items.sort((a,b) => parseInt(getDist(a)) - parseInt(getDist(b)));
      const c = strokeColors[sk];
      html += `<div style="margin-bottom:6px;">
        <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'"
          style="padding:8px 10px;cursor:pointer;background:${c}11;border-radius:8px;border-left:4px solid ${c};
          display:flex;align-items:center;gap:6px;">
          <span style="font-weight:800;color:${c};font-size:13px;">${sk}</span>
          <span style="font-size:11px;color:#888;">${strokeMap[sk]}</span>
          <span style="margin-left:auto;font-size:10px;color:#aaa;">${items.length} ▼</span>
        </div>
        <div>`;
      items.forEach(ev => {
        const lb = longBests.find(b => b.event === ev);
        const sb = shortMap[ev];
        html += timeRow(getDist(ev), lb, sb);
      });
      html += `</div></div>`;
    });
  } else if (mode === "all") {
    const sorted = [...allEvents].sort((a,b) => {
      const sa = strokeOrder.indexOf(getStroke(a)), sb2 = strokeOrder.indexOf(getStroke(b));
      if (sa !== sb2) return sa - sb2;
      return parseInt(getDist(a)) - parseInt(getDist(b));
    });
    sorted.forEach(ev => {
      const sk = getStroke(ev);
      const c = strokeColors[sk] || "#333";
      const lb = longBests.find(b => b.event === ev);
      const sb = shortMap[ev];
      html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:7px 4px;border-bottom:1px solid #f0f0f0;align-items:center;">
        <div style="font-size:12px;font-weight:600;color:#444;">
          <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${c};margin-right:5px;"></span>${ev}
        </div>
        <div style="text-align:center;font-family:var(--font-display);font-size:16px;font-weight:800;color:${lb?'#1a1a1a':'#ddd'};">${lb ? fmtTime(lb.bestTime) : '—'}</div>
        <div style="text-align:center;font-family:var(--font-display);font-size:16px;font-weight:800;color:${sb?'#1a1a1a':'#ddd'};">${sb ? fmtTime(sb.bestTime) : '—'}</div>
      </div>`;
    });
  } else if (mode === "dist") {
    distOrder.forEach(dist => {
      const items = [...allEvents].filter(ev => getDist(ev) === dist);
      if (items.length === 0) return;
      html += `<div style="margin-bottom:6px;">
        <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'"
          style="padding:8px 10px;cursor:pointer;background:#f0f4ff;border-radius:8px;border-left:4px solid var(--primary);
          display:flex;align-items:center;gap:6px;">
          <span style="font-weight:800;color:var(--primary);font-size:14px;">${dist}</span>
          <span style="margin-left:auto;font-size:10px;color:#aaa;">${items.length} ▼</span>
        </div>
        <div>`;
      items.forEach(ev => {
        const sk = getStroke(ev);
        const lb = longBests.find(b => b.event === ev);
        const sb = shortMap[ev];
        html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:7px 4px 7px 20px;border-bottom:1px solid #f0f0f0;align-items:center;">
          <div style="font-size:12px;font-weight:600;color:${strokeColors[sk]||'#444'};">${sk} ${strokeMap[sk]||""}</div>
          <div style="text-align:center;font-family:var(--font-display);font-size:16px;font-weight:800;color:${lb?'#1a1a1a':'#ddd'};">${lb ? fmtTime(lb.bestTime) : '—'}</div>
          <div style="text-align:center;font-family:var(--font-display);font-size:16px;font-weight:800;color:${sb?'#1a1a1a':'#ddd'};">${sb ? fmtTime(sb.bestTime) : '—'}</div>
        </div>`;
      });
      html += `</div></div>`;
    });
  }

  html += `</div>`;
  el.innerHTML = html;
}

function timeRow(label, longB, shortB) {
  return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:7px 4px 7px 20px;border-bottom:1px solid #f0f0f0;align-items:center;">
    <div style="font-size:12px;font-weight:600;color:#444;">${label}</div>
    <div style="text-align:center;font-family:var(--font-display);font-size:16px;font-weight:800;color:${longB?'#1a1a1a':'#ddd'};">${longB ? fmtTime(longB.bestTime) : '—'}</div>
    <div style="text-align:center;font-family:var(--font-display);font-size:16px;font-weight:800;color:${shortB?'#1a1a1a':'#ddd'};">${shortB ? fmtTime(shortB.bestTime) : '—'}</div>
  </div>`;
}

function renderGraphTab() {

}

function selectGraphEvent(ev) {

/** 長水路・短水路を分けてグラフ描画 */
function drawGraphSplit(eventName, allTimes) {
  // 大会名から年月を抽出してソート（古い順→新しい順 = グラフ左→右）
  const sortByYearMonth = (a, b) => {
    const ya = extractYearMonth(a.comp || a.date || "");
    const yb = extractYearMonth(b.comp || b.date || "");
    return ya.localeCompare(yb); // 昇順（古い順）
  };

  // 長水路の記録（大会名に「_短」を含まないもの）
  const longTimes = allTimes
    .filter(t => {
      const ev = (t.event || "").replace("(短水路)","").trim();
      return ev === eventName && t.totalTime && !(t.comp || "").includes("_短");
    })
    .sort(sortByYearMonth);

  // 短水路の記録
  const shortTimes = allTimes
    .filter(t => {
      const ev = (t.event || "").replace("(短水路)","").trim();
      return ev === eventName && t.totalTime && ((t.comp || "").includes("_短") || (t.event || "").includes("(短水路)"));
    })
    .sort(sortByYearMonth);

  if (longTimes.length === 0 && shortTimes.length === 0) {
    document.getElementById("improvBox").innerHTML = '<span style="color:var(--muted);font-size:12px;">データなし</span>';
    return;
  }

  // 全期間のラベルを年月順で統合（古い→新しい）
  const labelMap = new Map(); // label → yearMonth（ソート用）
  const addLabel = (t) => {
    const label = t.comp || t.date || "";
    const ym = extractYearMonth(label);
    if (!labelMap.has(label)) labelMap.set(label, ym);
  };
  longTimes.forEach(addLabel);
  shortTimes.forEach(addLabel);

  // 年月順にソート（古い→新しい = 左→右）
  const sortedLabels = [...labelMap.entries()]
    .sort((a, b) => a[1].localeCompare(b[1]))
    .map(e => e[0]);

  // 各ラベルに対応する値を生成
  const longData = sortedLabels.map(l => {
    const match = longTimes.find(t => (t.comp || t.date || "") === l);
    return match ? timeToSec(match.totalTime) : null;
  });
  const shortData = sortedLabels.map(l => {
    const match = shortTimes.find(t => (t.comp || t.date || "") === l);
    return match ? timeToSec(match.totalTime) : null;
  });

  // 短いラベル名にする
  const displayLabels = sortedLabels.map(l => {
    if (l.length > 12) return l.substring(0, 10) + "..";
    return l;
  });

  drawGraphDual(displayLabels, longData, shortData, sortedLabels);
}

/** 2系列（長水路・短水路）でChart.js描画 — 比較データは各系列独立 */
function drawGraphDual(labels, longData, shortData, fullLabels) {
  const longValues = longData.filter(v => v !== null && v !== undefined);
  const shortValues = shortData.filter(v => v !== null && v !== undefined);
  const allValues = [...longValues, ...shortValues];
  if (allValues.length === 0) return;

  // 長水路の最高・最低
  const longMin = longValues.length > 0 ? Math.min(...longValues) : null;
  const longMax = longValues.length > 0 ? Math.max(...longValues) : null;
  const longDiff = (longMin !== null && longMax !== null) ? (longMax - longMin).toFixed(2) : "—";
  const longPct = (longMin !== null && longMax !== null && longMax > 0) ? ((longMax - longMin) / longMax * 100).toFixed(1) : "—";

  // 短水路の最高・最低
  const shortMin = shortValues.length > 0 ? Math.min(...shortValues) : null;
  const shortMax = shortValues.length > 0 ? Math.max(...shortValues) : null;
  const shortDiff = (shortMin !== null && shortMax !== null) ? (shortMax - shortMin).toFixed(2) : "—";
  const shortPct = (shortMin !== null && shortMax !== null && shortMax > 0) ? ((shortMax - shortMin) / shortMax * 100).toFixed(1) : "—";

  const improvEl = document.getElementById("improvBox");
  if (improvEl) {
    // コーチング分析コメント生成
    const getInsight = (pctNum, course) => {
      if (pctNum === "—") return "";
      const p = parseFloat(pctNum);
      if (p < 2) return `<div style="margin-top:6px;padding:6px 10px;background:rgba(22,163,74,.06);border-radius:8px;font-size:11px;color:var(--green);font-weight:600;">🟢 安定型 — レースでの再現性が高い</div>`;
      if (p < 5) return `<div style="margin-top:6px;padding:6px 10px;background:rgba(0,85,212,.06);border-radius:8px;font-size:11px;color:var(--primary);font-weight:600;">🔵 標準 — コンディション管理が安定</div>`;
      if (p < 10) return `<div style="margin-top:6px;padding:6px 10px;background:rgba(212,147,10,.06);border-radius:8px;font-size:11px;color:var(--gold);font-weight:600;">🟡 波あり — レース戦略の見直しを推奨</div>`;
      return `<div style="margin-top:6px;padding:6px 10px;background:rgba(220,38,38,.06);border-radius:8px;font-size:11px;color:var(--red);font-weight:600;">🔴 要改善 — 準備・集中力にムラの可能性</div>`;
    };

    let html = '<div style="display:flex;flex-wrap:wrap;gap:10px;">';
    if (longValues.length > 0) {
      html += `<div style="flex:1;min-width:150px;padding:12px 14px;background:rgba(0,85,212,.03);border:1px solid rgba(0,85,212,.1);border-radius:12px;">
        <div style="font-family:var(--font-display);font-size:11px;font-weight:700;color:#0055d4;letter-spacing:.06em;margin-bottom:8px;">● 長水路</div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;">
          <span style="font-size:11px;color:var(--muted);">最高タイム</span>
          <span style="font-family:var(--font-display);font-size:18px;font-weight:800;color:#0055d4;">${secToTime(longMin)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
          <span style="font-size:11px;color:var(--muted);">最低タイム</span>
          <span style="font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--dim);">${secToTime(longMax)}</span>
        </div>
        <div style="border-top:1px solid rgba(0,85,212,.08);padding-top:4px;font-size:11px;color:var(--text);font-weight:600;">
          最高と最低の差: <span style="color:var(--red);">▼ ${longDiff}秒</span> <span style="color:var(--muted);">(${longPct}%)</span>
        </div>
        ${getInsight(longPct, "長水路")}
      </div>`;
    }
    if (shortValues.length > 0) {
      html += `<div style="flex:1;min-width:150px;padding:12px 14px;background:rgba(234,88,12,.03);border:1px solid rgba(234,88,12,.1);border-radius:12px;">
        <div style="font-family:var(--font-display);font-size:11px;font-weight:700;color:#ea580c;letter-spacing:.06em;margin-bottom:8px;">● 短水路</div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;">
          <span style="font-size:11px;color:var(--muted);">最高タイム</span>
          <span style="font-family:var(--font-display);font-size:18px;font-weight:800;color:#ea580c;">${secToTime(shortMin)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
          <span style="font-size:11px;color:var(--muted);">最低タイム</span>
          <span style="font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--dim);">${secToTime(shortMax)}</span>
        </div>
        <div style="border-top:1px solid rgba(234,88,12,.08);padding-top:4px;font-size:11px;color:var(--text);font-weight:600;">
          最高と最低の差: <span style="color:var(--red);">▼ ${shortDiff}秒</span> <span style="color:var(--muted);">(${shortPct}%)</span>
        </div>
        ${getInsight(shortPct, "短水路")}
      </div>`;
    }
    html += '</div>';
    improvEl.innerHTML = html;
  }

  if (state.chart) { state.chart.destroy(); state.chart = null; }
  const ctx = document.getElementById("timeChartCanvas").getContext("2d");
  
  const datasets = [];
  
  // 長水路データセット
  if (longValues.length > 0) {
    datasets.push({
      label: "長水路",
      data: longData,
      borderColor: "#0055d4",
      backgroundColor: "rgba(0,85,212,.08)",
      borderWidth: 2.5,
      pointBackgroundColor: longData.map(v => v === longMin ? "#d4930a" : "#0055d4"),
      pointRadius: longData.map(v => v === null ? 0 : (v === longMin ? 8 : 5)),
      pointBorderColor: "#fff",
      pointBorderWidth: 2,
      tension: 0.3, fill: true,
      spanGaps: true,
    });
  }
  
  // 短水路データセット
  if (shortValues.length > 0) {
    datasets.push({
      label: "短水路",
      data: shortData,
      borderColor: "#ea580c",
      backgroundColor: "rgba(234,88,12,.06)",
      borderWidth: 2.5,
      borderDash: [6, 3],
      pointBackgroundColor: shortData.map(v => v === shortMin ? "#d4930a" : "#ea580c"),
      pointRadius: shortData.map(v => v === null ? 0 : (v === shortMin ? 8 : 5)),
      pointBorderColor: "#fff",
      pointBorderWidth: 2,
      tension: 0.3, fill: true,
      spanGaps: true,
    });
  }

  state.chart = new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: "top",
          labels: { usePointStyle: true, pointStyle: "circle", padding: 16,
            font: { family: "Outfit, sans-serif", size: 11, weight: "600" },
            color: "#6b7280" }
        },
        tooltip: {
          backgroundColor: "#fff", borderColor: "#e0e3ea", borderWidth: 1,
          titleColor: "#111827", bodyColor: "#374151",
          titleFont: { family: "Outfit, sans-serif", weight: "700", size: 13 },
          bodyFont: { family: "DM Sans, sans-serif", size: 13 },
          cornerRadius: 10, padding: 14,
          callbacks: {
            title: (items) => {
              if (!items.length) return "";
              const idx = items[0].dataIndex;
              return fullLabels[idx] || items[0].label || "";
            },
            label: c => c.dataset.label + ": " + secToTime(c.parsed.y)
          }
        }
      },
      scales: {
        y: {
          reverse: true,
          ticks: { color: "#9ca3af", font: { family: "Outfit", size: 10 }, callback: v => secToTime(v) },
          grid: { color: "rgba(0,0,0,.04)" }, border: { display: false }
        },
        x: {
          ticks: { color: "#9ca3af", font: { family: "Outfit", size: 9 }, maxRotation: 45 },
          grid: { display: false }, border: { display: false }
        }
      }
    }
  });
}

function drawGraphFromData(labels, data) {
  drawGraphDual(labels, data, [], []);
}

function openLapModal(recordId) {
  const times = state.currentAthlete?.times || [];
  const rec = times.find(t => t.recordId === recordId);
  if (!rec) return;

  const laps = rec.laps || {};
  const lapEntries = [
    ["50m", laps.lap1],
    ["100m", laps.lap2],
    ["150m", laps.lap3],
    ["200m", laps.lap4],
    ["250m", laps.lap5],
  ].filter(([,v]) => v);

  let html = `
    <div style="font-family:var(--font-display);font-size:16px;
      font-weight:700;margin-bottom:14px;">${rec.comp}<br>
      <span style="color:var(--cyan);">${rec.event}</span>
      <span style="font-size:13px;color:var(--dim);margin-left:8px;">${rec.date}</span>
    </div>
    <div class="lap-row">
      <span class="lap-label">🏆 トータルタイム</span>
      <span class="lap-value" style="color:${rec.isPB?'var(--gold)':'var(--cyan)'};">
        ${rec.totalTime}</span>
    </div>`;

  if (lapEntries.length > 0) {
    html += `<div style="font-size:11px;color:var(--dim);margin:12px 0 4px;
      font-family:var(--font-display);letter-spacing:1px;">ラップタイム（累積）</div>`;
    let prevSec = 0;
    lapEntries.forEach(([label, val]) => {
      const sec = timeToSec(String(val));
      const split = sec > 0 && prevSec > 0 ? (sec - prevSec).toFixed(2) + "秒" : "";
      html += `<div class="lap-row">
        <span class="lap-label">${label}</span>
        <div><span class="lap-value">${val}</span>
          ${split ? `<span class="lap-split">(${split})</span>` : ""}</div>
      </div>`;
      if (sec > 0) prevSec = sec;
    });
  }

  if (rec.videoUrl) {
    html += `<button class="btn-outline" style="margin-top:14px;width:100%;justify-content:center;"
      onclick="openVideo('${esc(rec.comp)} ${esc(rec.event)}','${esc(rec.videoUrl)}')">
      ▶ このレースの動画を見る</button>`;
  }

  document.getElementById("lapContent").innerHTML = html;
  document.getElementById("lapModal").classList.add("open");
}
function closeLapModal(e) {
  if (!e || e.target.id === "lapModal") document.getElementById("lapModal").classList.remove("open");
}

  showPage("page-compare");
  renderCompareSetup();

function renderCompareSetup() {
  const myId   = state.currentUser.athleteId;
  const myName = state.currentUser.name;
  const athletes = state.athleteList.length > 0
    ? state.athleteList
    : []; // 選手の場合は一覧取得が必要

  const listHTML = athletes
    .filter(a => a.athleteId !== myId)
    .map(a => `
      <div class="card candidate-card" style="margin-bottom:8px;"
        onclick="loadComparison('${a.athleteId}','')">
        <div class="ath-avatar ${gradeClass(a.grade)}" style="width:40px;height:40px;font-size:15px;">
          ${getInitials(a.name)}</div>
        <div>
          <div style="font-family:var(--font-display);font-size:17px;font-weight:700;">
            ${a.name}</div>
          <div style="font-size:11px;color:var(--dim);">
            ${a.grade}　${a.event || ""}</div>
        </div>
        <div style="margin-left:auto;color:var(--dim);">›</div>
      </div>`).join("");

  document.getElementById("compareContent").innerHTML = `
    <div style="padding:16px;">
      <div class="section-lbl" style="margin-top:4px;">比較する選手を選択</div>
      <div class="comp-search-wrap">
        <input class="search-field" id="compSearch" placeholder="名前で検索..."
          oninput="filterCompList(this.value)">
      </div>
      <div id="compList">
        ${listHTML || emptyHTML("選手データを読み込んでいます...")}
      </div>
    </div>`;

  // 選手権限のユーザーの場合は一覧を取得
  if (athletes.length === 0) {
    api({ action: "getAthleteList" }).then(res => {
      if (res.success) {
        state.athleteList = res.athletes;
        renderCompareSetup();
      }
    });
  }
}

function filterCompList(q) {
  const myId = state.currentUser.athleteId;
  const filtered = state.athleteList
    .filter(a => a.athleteId !== myId &&
      (a.name.includes(q) || (a.event && a.event.includes(q))));
  document.getElementById("compList").innerHTML =
    filtered.map(a => `
      <div class="card candidate-card" style="margin-bottom:8px;"
        onclick="loadComparison('${a.athleteId}','')">
        <div class="ath-avatar ${gradeClass(a.grade)}" style="width:40px;height:40px;font-size:15px;">
          ${getInitials(a.name)}</div>
        <div>
          <div style="font-family:var(--font-display);font-size:17px;font-weight:700;">
            ${a.name}</div>
          <div style="font-size:11px;color:var(--dim);">${a.grade}　${a.event || ""}</div>
        </div>
        <div style="margin-left:auto;color:var(--dim);">›</div>
      </div>`).join("") || emptyHTML("見つかりません");
}

async function loadComparison(targetId, eventName) {
  document.getElementById("compareContent").innerHTML = `<div style="padding:16px;">${loadingHTML()}</div>`;
  const res = await api({
    action:   "compareAthletes",
    myId:     state.currentUser.athleteId,
    targetId,
    event:    eventName,
  });
  if (!res.success) { showError(res.error); return; }
  renderCompareResult(res, targetId);
}

function renderCompareResult(data, targetId) {
  const me     = data.me;
  const target = data.target;
  const diff   = data.diff;

  // 種目選択チップ
  const myEvents = me.allEvents || [];
  const chips = myEvents.map(ev => `
    <div class="ev-chip ${ev === data.event ? 'active' : ''}"
      onclick="loadComparison('${targetId}','${esc(ev)}')">${ev}</div>`).join("");

  // ラップ比較テーブル
  let tableHTML = "";
  if (me.best && target.best) {
    const myLaps  = me.best.laps     || {};
    const thLaps  = target.best.laps || {};
    const lapKeys = [["lap1","50m"],["lap2","100m"],["lap3","150m"],["lap4","200m"]];
    const rows = lapKeys
      .filter(([k]) => myLaps[k] || thLaps[k])
      .map(([k, label]) => {
        const mySec = timeToSec(String(myLaps[k] || ""));
        const thSec = timeToSec(String(thLaps[k] || ""));
        const diffSec = mySec && thSec ? Math.round((mySec - thSec) * 100) / 100 : null;
        const diffClass = diffSec === null ? "" : diffSec > 0 ? "pos" : diffSec < 0 ? "neg" : "zero";
        const diffTxt = diffSec === null ? "—" : (diffSec > 0 ? "+" : "") + diffSec;
        return `<tr>
          <td>${label}</td>
          <td class="td-mine">${myLaps[k] || "—"}</td>
          <td class="td-theirs">${thLaps[k] || "—"}</td>
          <td class="td-diff ${diffClass}">${diffTxt}</td>
        </tr>`;
      }).join("");

    const totalDiff = diff ? diff.seconds : null;
    const tdClass = totalDiff === null ? "" : totalDiff > 0 ? "pos" : totalDiff < 0 ? "neg" : "zero";
    const tdTxt = totalDiff === null ? "—" : (totalDiff > 0 ? "+" : "") + totalDiff + "秒";

    tableHTML = `
      <table class="comp-table" style="margin-top:4px;">
        <tr><th>区間</th><th style="color:var(--cyan);">${me.profile.name.replace("　","")}</th>
            <th>${target.profile.name.replace("　","")}</th><th>差</th></tr>
        ${rows}
        <tr style="font-weight:700;">
          <td>Total</td>
          <td class="td-mine" style="font-size:16px;">${me.best?.totalTime || "—"}</td>
          <td class="td-theirs" style="font-size:16px;">${target.best?.totalTime || "—"}</td>
          <td class="td-diff ${tdClass}" style="font-size:14px;">${tdTxt}</td>
        </tr>
      </table>`;
  }

  // 推移グラフデータ
  const myHistory  = (me.history || []).map(h => ({ x: h.date?.slice(0,7), y: timeToSec(h.totalTime) }));
  const thHistory  = (target.history || []).map(h => ({ x: h.date?.slice(0,7), y: timeToSec(h.totalTime) }));
  const allLabels  = [...new Set([...myHistory.map(h=>h.x), ...thHistory.map(h=>h.x)])].sort();

  document.getElementById("compareContent").innerHTML = `
    <div style="padding:14px;">
      <div class="ev-chips">${chips}</div>

      <div class="card comp-header" style="margin-bottom:12px;">
        <div class="comp-player">
          <div class="comp-avatar">${getInitials(me.profile.name)}</div>
          <div class="comp-name">${me.profile.name}</div>
          <div class="comp-best" style="color:var(--cyan);">${me.best?.totalTime || "—"}</div>
        </div>
        <div class="comp-vs">VS</div>
        <div class="comp-player">
          <div class="comp-avatar" style="background:linear-gradient(135deg,#6a3483,#9b59b6);">
            ${getInitials(target.profile.name)}</div>
          <div class="comp-name">${target.profile.name}</div>
          <div class="comp-best">${target.best?.totalTime || "—"}</div>
        </div>
      </div>

      ${diff ? `
      <div class="card" style="padding:12px 14px;margin-bottom:12px;
        background:${diff.seconds > 0 ? 'rgba(255,77,109,.08)' : 'rgba(57,217,138,.08)'};
        border-color:${diff.seconds > 0 ? 'rgba(255,77,109,.3)' : 'rgba(57,217,138,.3)'};">
        <div style="font-size:11px;color:var(--dim);">ベストタイム比較</div>
        <div style="font-family:var(--font-display);font-size:18px;font-weight:700;
          color:${diff.seconds > 0 ? 'var(--red)' : 'var(--green)'};">
          ${diff.display}</div>
      </div>` : ""}

      <div class="section-lbl">ラップ・タイム詳細</div>
      <div class="card" style="overflow:hidden;margin-bottom:12px;">${tableHTML || emptyHTML("ラップデータなし")}</div>

      ${allLabels.length > 0 ? `
      <div class="section-lbl">タイム推移（比較）</div>
      <div class="card" style="padding:14px;margin-bottom:16px;">
        <div class="comp-graph-wrap"><canvas id="compChartCanvas"></canvas></div>
        <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;">
          <span style="color:var(--cyan);">● ${me.profile.name.replace("　","")}</span>
          <span style="color:#9b59b6;">● ${target.profile.name.replace("　","")}</span>
        </div>
      </div>` : ""}

      <button class="btn-outline" style="width:100%;justify-content:center;"
        onclick="renderCompareSetup()">← 別の選手と比較</button>
    </div>`;

  // 比較グラフ描画
  if (allLabels.length > 0) {
    setTimeout(() => {
      const canvas = document.getElementById("compChartCanvas");
      if (!canvas) return;
      if (state.compChart) { state.compChart.destroy(); state.compChart = null; }
      state.compChart = new Chart(canvas.getContext("2d"), {
        type: "line",
        data: {
          labels: allLabels,
          datasets: [
            { label: me.profile.name,
              data: allLabels.map(l => { const f = myHistory.find(h=>h.x===l); return f ? f.y : null; }),
              borderColor:"#00d4ff", backgroundColor:"rgba(26,115,232,.06)",
              borderWidth:2.5, tension:0.35, fill:true,
              pointRadius:4, pointBackgroundColor:"#00d4ff", spanGaps:true },
            { label: target.profile.name,
              data: allLabels.map(l => { const f = thHistory.find(h=>h.x===l); return f ? f.y : null; }),
              borderColor:"#9b59b6", backgroundColor:"rgba(155,89,182,.06)",
              borderWidth:2.5, tension:0.35, fill:true,
              pointRadius:4, pointBackgroundColor:"#9b59b6", spanGaps:true },
          ]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false},
            tooltip:{ backgroundColor:"#0f2035",borderColor:"#1a3555",borderWidth:1,
              callbacks:{ label: c => c.dataset.label + ": " + c.parsed.y + "秒" }}},
          scales:{
            y:{ reverse:true, ticks:{ color:"#7a9cc0",font:{size:9},callback:v=>v+"秒" },
              grid:{color:"rgba(26,53,85,.6)"},border:{display:false} },
            x:{ ticks:{color:"#7a9cc0",font:{size:9}},
              grid:{display:false},border:{display:false} }
          }
        }
      });
    }, 100);
  }
}

function updateStrokeOptions() {
  const dist = document.getElementById("recDist").value;
  const sel = document.getElementById("recStroke");
  const hidden = document.getElementById("recEvent");

  const map = {
    "50m":   ["自由形:Fr","背泳ぎ:Ba","平泳ぎ:Br","バタフライ:Fly"],
    "100m":  ["自由形:Fr","背泳ぎ:Ba","平泳ぎ:Br","バタフライ:Fly","個人メドレー:IM"],
    "200m":  ["自由形:Fr","背泳ぎ:Ba","平泳ぎ:Br","バタフライ:Fly","個人メドレー:IM"],
    "400m":  ["自由形:Fr","個人メドレー:IM"],
    "800m":  ["自由形:Fr"],
    "1500m": ["自由形:Fr"],
  };

  if (!dist) {
    sel.innerHTML = '<option value="">先に距離を選択</option>';
    sel.disabled = true;
    hidden.value = "";
    return;
  }

  const strokes = map[dist] || [];
  sel.innerHTML = strokes.map(s => {
    const [label, code] = s.split(":");
    return `<option value="${code}">${label}</option>`;
  }).join("");
  sel.disabled = false;

  // 最初の種目で自動セット
  const firstCode = strokes[0]?.split(":")[1] || "";
  hidden.value = dist + " " + firstCode;

  sel.onchange = () => {
    hidden.value = dist + " " + sel.value;
  };
}

async function submitRecord() {
  const record = {
    comp:      document.getElementById("recComp").value,
    date:      document.getElementById("recDate").value,
    athleteId: document.getElementById("recAthlete").value,
    event:     document.getElementById("recEvent").value,
    heat:      document.getElementById("recHeat").value,
    place:     document.getElementById("recPlace").value,
    totalTime: document.getElementById("recTotal").value,
    laps: {
      lap1: document.getElementById("recLap1").value,
      lap2: document.getElementById("recLap2").value,
      lap3: document.getElementById("recLap3").value,
      lap4: document.getElementById("recLap4").value,
    },
    isPB:      document.getElementById("recPB").checked,
    videoUrl:  document.getElementById("recVideo").value,
    note:      document.getElementById("recNote").value,
  };

  if (!record.comp || !record.athleteId || !record.event || !record.totalTime) {
    document.getElementById("recError").textContent = "大会名・選手・種目・タイムは必須です";
    document.getElementById("recError").style.display = "block";
    return;
  }
  document.getElementById("recError").style.display = "none";

  const btn = document.querySelector("#addRecordContent .btn-primary");
  btn.textContent = "送信中...";
  btn.disabled = true;

  const res = await api({ action: "addTimeRecord", record });
  btn.textContent = "💾 記録を登録する";
  btn.disabled = false;

  if (res.success) {
    document.getElementById("recSuccess").textContent = "✅ " + res.message;
    document.getElementById("recSuccess").style.display = "block";
    // フォームをリセット
    ["recComp","recEvent","recTotal","recLap1","recLap2","recLap3","recLap4","recVideo","recNote"]
      .forEach(id => document.getElementById(id).value = "");
    document.getElementById("recDist").value = "";
    updateStrokeOptions();
    document.getElementById("recPB").checked = false;
  } else {
    document.getElementById("recError").textContent = "❌ " + res.error;
    document.getElementById("recError").style.display = "block";
  }
}

/** タイム表示フォーマット（末尾の0を保持: 26.1→26.10、52→52.00） */
function fmtTime(t) {
  if (!t) return "";
  let s = String(t).trim();
  if (/^\d+$/.test(s)) return s + ".00";
  if (/^\d+\.\d$/.test(s)) return s + "0";
  return s;
}

function getInitials(name) {
  if (!name) return "?";
  const clean = name.replace(/\s/g, "");
  return clean.length >= 2 ? clean[0] + clean[clean.length - 1] : clean[0] || "?";
}

function gradeClass(grade) {
  return { "4年":"yr4","3年":"yr3","2年":"yr2","1年":"yr1","OBOG":"yr-obog" }[grade] || "";
}

function timeToSec(str) {
  if (!str) return 0;
  str = String(str).trim();
  // "1:50.27" or "15:11.74" format
  if (str.includes(":")) {
    const [m, s] = str.split(":");
    return parseFloat(m) * 60 + parseFloat(s);
  }
  // "1.50.27" format (分.秒.百分の秒) — CUSTベスト一覧の表記
  const dots = str.split(".");
  if (dots.length === 3) {
    return parseFloat(dots[0]) * 60 + parseFloat(dots[1]) + parseFloat(dots[2]) / 100;
  }
  // "52.00" or "26.10" — 秒のみ
  return parseFloat(str) || 0;
}

/** 秒数を分:秒.百分の秒に変換 (例: 895.66 → "14:55.66") */
function secToTime(sec) {
  if (!sec || sec <= 0) return "";
  if (sec < 60) return sec.toFixed(2);
  const m = Math.floor(sec / 60);
  const s = (sec % 60).toFixed(2);
  return m + ":" + (s < 10 ? "0" : "") + s;
}

function esc(str) {
  return String(str || "").replace(/'/g,"&#39;").replace(/"/g,"&quot;");
}

function loadingHTML() {
  return `<div class="loading-wrap"><div class="spinner"></div>
    <div style="font-size:12px;color:var(--dim);">読み込み中...</div></div>`;
}

function emptyHTML(msg) {
  return `<div class="empty-state"><div class="es-icon">📭</div>${msg}</div>`;
}

function hideSplash() {
  document.getElementById("splash").classList.add("hidden");
}

function showError(msg) {
  hideSplash();
  document.getElementById("mainScroll").innerHTML = `
    <div class="empty-state" style="padding-top:80px;">
      <div class="es-icon">⚠️</div>
      <div style="color:var(--red);font-size:14px;margin-bottom:8px;">${msg}</div>
      <button class="btn-outline" onclick="location.reload()">再読み込み</button>
    </div>`;
}

//  試合登録（CUSTベスト一覧の大会シートからインポート）
// ══════════════════════════════════════════════════════
async function openCompImporter() {
  let modal = document.getElementById("compModal");
  if (!modal) {
    modal = document.createElement("div");
    modal.id = "compModal";
    modal.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px;";
    document.body.appendChild(modal);
  }
  modal.style.display = "flex";
  modal.innerHTML = `<div style="background:var(--card);border-radius:var(--r);width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-lg);">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
      <div style="font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--green);">🏁 試合登録</div>
      <div onclick="document.getElementById('compModal').style.display='none'" style="cursor:pointer;font-size:20px;color:var(--muted);">✕</div>
    </div>
    <div style="padding:20px;text-align:center;color:var(--muted);">読み込み中...</div>
  </div>`;
  
  const res = await api({ action: "getCompetitionSheets" });
  if (!res.success) {
    modal.querySelector("div > div:last-child").innerHTML = `<div style="padding:20px;color:var(--red);">エラー: ${res.error}</div>`;
    return;
  }
  
  const comps = res.competitions || [];
  const unregistered = comps.filter(c => !c.isRegistered);
  const registered = comps.filter(c => c.isRegistered);
  
  modal.querySelector("div > div:last-child").innerHTML = `
    <div style="padding:16px 20px;overflow-y:auto;flex:1;">
      ${unregistered.length > 0 ? `
        <div style="font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--green);margin-bottom:10px;letter-spacing:.06em;">未登録の試合 (${unregistered.length})</div>
        ${unregistered.map(c => `
          <div style="display:flex;align-items:center;gap:10px;padding:12px;margin-bottom:8px;background:rgba(22,163,74,.04);border:1px solid rgba(22,163,74,.12);border-radius:12px;">
            <div style="flex:1;">
              <div style="font-weight:700;font-size:14px;color:var(--text);">${c.displayName}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px;">${c.sheetName}</div>
            </div>
            <button onclick="importComp('${c.sheetName}',this)" style="padding:8px 16px;border-radius:100px;background:var(--green);color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;white-space:nowrap;">
              登録
            </button>
          </div>
        `).join("")}
      ` : '<div style="padding:12px;color:var(--muted);font-size:13px;">すべての試合が登録済みです</div>'}
      
      ${registered.length > 0 ? `
        <div style="font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--muted);margin-top:16px;margin-bottom:10px;letter-spacing:.06em;">登録済み (${registered.length})</div>
        ${registered.map(c => `
          <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:6px;background:var(--surface);border-radius:10px;opacity:.6;">
            <div style="flex:1;">
              <div style="font-weight:600;font-size:13px;color:var(--dim);">${c.displayName}</div>
            </div>
            <span style="font-size:11px;color:var(--muted);">✓ 登録済</span>
          </div>
        `).join("")}
      ` : ''}
    </div>
  `;
}

async function importComp(sheetName, btn) {
  btn.textContent = "登録中...";
  btn.disabled = true;
  btn.style.opacity = ".6";
  
  const res = await api({ action: "importCompetition", sheetName });
  
  if (res.success) {
    btn.textContent = "✓ 完了";
    btn.style.background = "var(--muted)";
    const parentDiv = btn.closest("div[style*='flex']");
    if (parentDiv) {
      parentDiv.style.background = "rgba(22,163,74,.08)";
      parentDiv.style.borderColor = "rgba(22,163,74,.2)";
    }
    // 2秒後にモーダルを更新
    setTimeout(() => openCompImporter(), 1500);
  } else {
    btn.textContent = "エラー";
    btn.style.background = "var(--red)";
    alert("登録エラー: " + res.error);
    setTimeout(() => {
      btn.textContent = "登録";
      btn.disabled = false;
      btn.style.opacity = "1";
      btn.style.background = "var(--green)";
    }, 2000);
  }
}

//  OBOG管理
// ══════════════════════════════════════════════════════
async function openOBOGManager() {
  // モーダルを作成
  let modal = document.getElementById("obogModal");
  if (!modal) {
    modal = document.createElement("div");
    modal.id = "obogModal";
    modal.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px;";
    document.body.appendChild(modal);
  }
  modal.style.display = "flex";
  modal.innerHTML = `<div style="background:var(--card);border-radius:var(--r);width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-lg);">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
      <div style="font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--gold);">🎓 OBOG管理</div>
      <div onclick="closeOBOGModal()" style="cursor:pointer;font-size:22px;color:var(--muted);">✕</div>
    </div>
    <div id="obogContent" style="padding:16px 20px;overflow-y:auto;flex:1;">
      <div style="text-align:center;color:var(--muted);padding:30px;">読み込み中...</div>
    </div>
  </div>`;

  const res = await api({ action: "getOBOGList" });
  if (!res.success) {
    document.getElementById("obogContent").innerHTML = `<div style="color:var(--red);padding:20px;">エラー: ${res.error}</div>`;
    return;
  }

  const list = res.obogList || [];
  const registered = list.filter(a => a.registered);
  const unregistered = list.filter(a => !a.registered);

  document.getElementById("obogContent").innerHTML = `
    <div style="font-family:var(--font-display);font-size:12px;color:var(--muted);margin-bottom:12px;letter-spacing:.04em;">
      登録済: ${registered.length}人 / 未登録: ${unregistered.length}人 / 合計: ${list.length}人
    </div>

    ${unregistered.length > 0 ? `
      <div style="font-family:var(--font-display);font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text);">未登録のOBOG（チェックして登録）</div>
      <div style="margin-bottom:8px;">
        <label style="font-size:11px;color:var(--muted);cursor:pointer;">
          <input type="checkbox" id="obogSelectAll" onchange="toggleAllOBOG(this.checked)" style="margin-right:6px;">全選択
        </label>
      </div>
      ${unregistered.map(a => `
        <label class="card" style="display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;">
          <input type="checkbox" class="obog-check" value="${a.athleteId}" style="flex-shrink:0;">
          <div class="ath-avatar yr-obog" style="width:32px;height:32px;font-size:12px;">${(a.name||"").slice(0,1)}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:600;">${a.name}</div>
            <div style="font-size:10px;color:var(--muted);">${a.gender}</div>
          </div>
        </label>`).join("")}
      <button onclick="submitOBOGRegistration()" style="margin-top:12px;width:100%;padding:12px;
        border-radius:100px;background:var(--gold);border:none;color:#fff;font-size:13px;
        font-weight:700;cursor:pointer;">✓ 選択したOBOGを登録</button>
    ` : '<div style="color:var(--muted);font-size:13px;padding:8px 0;">未登録のOBOGはいません</div>'}

    ${registered.length > 0 ? `
      <div style="font-family:var(--font-display);font-size:13px;font-weight:700;margin:20px 0 8px;color:var(--text);">登録済みOBOG</div>
      ${registered.map(a => `
        <div class="card" style="display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:6px;opacity:.6;">
          <input type="checkbox" checked disabled style="flex-shrink:0;">
          <div class="ath-avatar yr-obog" style="width:32px;height:32px;font-size:12px;">${(a.name||"").slice(0,1)}</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;color:var(--dim);">${a.name}</div>
          </div>
          <span style="font-size:10px;color:var(--green);font-weight:600;">✓ 登録済</span>
        </div>`).join("")}
    ` : ""}
  `;
}

function closeOBOGModal() {
  const modal = document.getElementById("obogModal");
  if (modal) modal.style.display = "none";
}

function toggleAllOBOG(checked) {
  document.querySelectorAll(".obog-check").forEach(cb => cb.checked = checked);
}

async function submitOBOGRegistration() {
  const checked = [...document.querySelectorAll(".obog-check:checked")].map(cb => cb.value);
  if (checked.length === 0) { alert("登録する選手を選択してください"); return; }
  if (!confirm(checked.length + "人のOBOGを登録しますか？")) return;

  const res = await api({ action: "registerOBOG", athleteIds: checked });
  if (res.success) {
    alert(res.message);
    // モーダルを再表示して登録済みを反映
    openOBOGManager();
  } else {
    alert("エラー: " + res.error);
  }
}

// ══════════════════════════════════════════════════════
//  起動
// ══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════
//  ランキング機能
// ══════════════════════════════════════════════════════

const RANK_STROKES = ["Fr","Ba","Br","Fly","IM"];
const RANK_STROKE_JA = {Fr:"自由形",Ba:"背泳ぎ",Br:"平泳ぎ",Fly:"バタフライ",IM:"個人メドレー"};
const RANK_DISTANCES = {Fr:["50m","100m","200m","400m","800m","1500m"],Ba:["50m","100m","200m"],Br:["50m","100m","200m"],Fly:["50m","100m","200m"],IM:["200m","400m"]};

let rankState = {
  mode: "best",     // best / year / grade / comp
  gender: "男子",
  course: "長水路",
  stroke: "Fr",
  distance: "50m",
  year: "2026",
  grade: "全学年",
  comp: "",
  results: null,
};

function renderRankingPage() {
  const el = document.getElementById("rankingContent");
  const s = rankState;
  const distances = RANK_DISTANCES[s.stroke] || ["50m","100m","200m"];

  const modeBtn = (m, label) => `<div onclick="rankState.mode='${m}';renderRankingPage()"
    style="padding:7px 14px;border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;
    background:${s.mode===m?'var(--primary)':'var(--surface)'};color:${s.mode===m?'#fff':'var(--dim)'};">${label}</div>`;

  const chipBtn = (key, val, label) => `<div onclick="rankState.${key}='${val}';renderRankingPage()"
    style="padding:6px 12px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;
    background:${s[key]===val?'var(--primary)':'var(--surface)'};color:${s[key]===val?'#fff':'var(--dim)'};">${label}</div>`;

  let html = `
    <div style="font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--text);margin-bottom:14px;">⭐ ランキング</div>

    <!-- モード選択 -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
      ${modeBtn("best","ベスト")}${modeBtn("year","年度別")}${modeBtn("grade","学年別")}${modeBtn("comp","試合別")}
    </div>

    <!-- 男女 -->
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      ${chipBtn("gender","男子","男子")}${chipBtn("gender","女子","女子")}
    </div>

    <!-- 水路 -->
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      ${chipBtn("course","長水路","長水路")}${chipBtn("course","短水路","短水路")}
    </div>

    <!-- 種目 -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
      ${RANK_STROKES.map(st => chipBtn("stroke", st, RANK_STROKE_JA[st])).join("")}
    </div>

    <!-- 距離 -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
      ${distances.map(d => chipBtn("distance", d, d)).join("")}
    </div>`;

  // モード別追加フィルター
  if (s.mode === "year") {
    const years = ["2026","2025","2024","2023"];
    html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
      ${years.map(y => chipBtn("year", y, y + "年度")).join("")}
    </div>`;
  }
  if (s.mode === "grade") {
    const grades = ["全学年","4年","3年","2年","1年"];
    html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
      ${grades.map(g => chipBtn("grade", g, g)).join("")}
    </div>`;
  }

  html += `<button onclick="fetchRanking()" style="width:100%;padding:12px;border-radius:100px;
    background:var(--primary);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;
    margin-bottom:14px;">🔍 検索</button>
    <div id="rankingResults"></div>`;

  el.innerHTML = html;

  // 距離の自動補正
  if (!distances.includes(s.distance)) {
    rankState.distance = distances[0];
    renderRankingPage();
    return;
  }

  // 前回の結果があれば表示
  if (s.results) showRankingResults(s.results);
}

async function fetchRanking() {
  const el = document.getElementById("rankingResults");
  el.innerHTML = loadingHTML();

  const s = rankState;
  const eventName = s.distance + " " + s.stroke;
  const res = await api({
    action: "getRanking",
    event: eventName,
    gender: s.gender,
    course: s.course,
    mode: s.mode,
    year: s.year,
    grade: s.grade,
    comp: s.comp,
  });

  if (!res.success) {
    el.innerHTML = `<div class="card" style="padding:16px;color:var(--red);">エラー: ${res.error}</div>`;
    return;
  }
  rankState.results = res;
  showRankingResults(res);
}

function showRankingResults(res) {
  const el = document.getElementById("rankingResults");
  const list = res.ranking || [];
  const s = rankState;

  if (list.length === 0) {
    el.innerHTML = emptyHTML("該当する記録がありません");
    return;
  }

  const medalColors = ["#d4930a","#9ca3af","#b45309"];

  let html = `<div style="font-family:var(--font-display);font-size:12px;color:var(--muted);margin-bottom:8px;">
    ${s.gender} / ${s.course} / ${s.distance} ${RANK_STROKE_JA[s.stroke]} — ${list.length}件</div>`;

  html += list.map((r, i) => {
    const rank = i + 1;
    const medal = rank <= 3 ? `<div style="width:28px;height:28px;border-radius:50%;
      background:${medalColors[rank-1]};color:#fff;display:flex;align-items:center;justify-content:center;
      font-family:var(--font-display);font-weight:900;font-size:13px;">${rank}</div>` :
      `<div style="width:28px;text-align:center;font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--muted);">${rank}</div>`;

    return `<div class="card" style="display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:6px;
      ${rank <= 3 ? 'border-left:3px solid '+medalColors[rank-1]+';' : ''}">
      ${medal}
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:14px;color:var(--text);">${r.name}</div>
        <div style="font-size:11px;color:var(--muted);">${r.grade || ""} ${r.comp || ""}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--primary);">${r.time}</div>
      </div>
    </div>`;
  }).join("");

  el.innerHTML = html;
}

window.addEventListener("load", init);
</script>
